name: CI

# Triggers: branch pushes to main/develop, all PRs, and manual dispatch.
# workflow_dispatch is also the only trigger that runs the (opt-in) behavioural eval.
on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:
    inputs:
      anthropic_model:
        description: "Model id for the behavioural eval (ANTHROPIC_MODEL)."
        required: false
        default: ""

jobs:
  # --------------------------------------------------------------------------
  # Required gate. No secrets needed — build, vet, test, discovery freshness,
  # and (advisory) lint. This is what must stay green for a PR to merge.
  # --------------------------------------------------------------------------
  gate:
    name: Gate (build / vet / test / discovery)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: MCP launcher resolves plugin root and preserves workspace
        run: |
          python3 - <<'EOF'
          import json, os, pathlib, stat, subprocess, tempfile

          with open("plugins/simulator/.mcp.json") as f:
              cfg = json.load(f)

          server = cfg.get("mcpServers", cfg)["simulator"]

          def fake_run_sh(plugin_root):
              run = pathlib.Path(plugin_root) / "mcp-server" / "run.sh"
              run.parent.mkdir(parents=True, exist_ok=True)
              run.write_text("#!/bin/sh\nprintf '%s\n' \"$SIMULATOR_WORK_DIR\" > \"$PROBE_OUT\"\n")
              run.chmod(run.stat().st_mode | stat.S_IXUSR)
              return run

          def run_case(label, env_extra, home_builder):
              with tempfile.TemporaryDirectory() as home, tempfile.TemporaryDirectory() as workspace:
                  probe_out = pathlib.Path(home) / "probe.txt"
                  env = {
                      "HOME": home,
                      "PATH": os.environ["PATH"],
                      "PROBE_OUT": str(probe_out),
                      **env_extra,
                  }
                  env.update(home_builder(home, probe_out) or {})
                  res = subprocess.run(
                      [server["command"], *server.get("args", [])],
                      cwd=workspace,
                      env=env,
                      text=True,
                      capture_output=True,
                      timeout=10,
                  )
                  if res.returncode != 0:
                      raise SystemExit(f"{label}: launcher failed\nstdout={res.stdout}\nstderr={res.stderr}")
                  got = probe_out.read_text().strip()
                  want = os.path.realpath(workspace)
                  if got != want:
                      raise SystemExit(f"{label}: SIMULATOR_WORK_DIR={got!r}, want {want!r}")

          with tempfile.TemporaryDirectory() as claude_root:
              fake_run_sh(claude_root)
              run_case("claude", {"CLAUDE_PLUGIN_ROOT": claude_root}, lambda home, out: None)

          def codex_home_case(home, probe_out):
              root = pathlib.Path(home) / ".codex" / "plugins" / "cache" / "simulator" / "simulator" / "999.0.0"
              fake_run_sh(root)

          run_case("codex-home", {}, codex_home_case)

          def codex_home_env_case(home, probe_out):
              codex_home = pathlib.Path(home) / "custom-codex-home"
              root = codex_home / "plugins" / "cache" / "simulator" / "simulator" / "999.0.0"
              fake_run_sh(root)
              return {"CODEX_HOME": str(codex_home)}

          run_case("codex-home-env", {}, codex_home_env_case)
          print(".mcp.json launcher smoke test passed.")
          EOF

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # Keep the toolchain in sync with the module's go.mod.
          go-version-file: plugins/simulator/mcp-server/go.mod
          # Cache Go modules + build cache keyed off the module's go.sum.
          cache: true
          cache-dependency-path: plugins/simulator/mcp-server/go.sum

      - name: Build
        run: make build

      - name: Vet
        run: make vet

      - name: Test
        run: make test

      # Regenerate the committed AI-discovery artifacts and fail if they drift.
      # A PR that changed SKILL.md frontmatter but forgot `make discovery` will
      # produce a non-empty diff here and fail with a clear message.
      - name: Discovery freshness (regenerate public/)
        run: make discovery

      - name: Discovery freshness (assert no drift)
        run: |
          if ! git diff --exit-code -- public/; then
            echo "::error::public/ is out of date. Run 'make discovery' locally and commit the result (do not hand-edit public/)."
            exit 1
          fi

      # Lint is advisory per AGENTS.md — never block the gate on it.
      - name: Lint (advisory)
        continue-on-error: true
        run: make lint

  # --------------------------------------------------------------------------
  # Behavioural eval. Opt-in, non-blocking, manual only — it spends Anthropic
  # API credits, so it must never run on push/PR. Runs only on workflow_dispatch.
  # If ANTHROPIC_API_KEY is absent, `make eval` self-skips and exits 0.
  # --------------------------------------------------------------------------
  behavioural-eval:
    name: Behavioural eval (opt-in)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: plugins/simulator/mcp-server/go.mod
          cache: true
          cache-dependency-path: plugins/simulator/mcp-server/go.sum

      - name: Run behavioural eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ github.event.inputs.anthropic_model }}
        run: make eval
